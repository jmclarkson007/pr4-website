<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4S | Journey Planner</title>
    <style>
        :root {
            --pr4s-red: #e60000;
            --pr4s-black: #000000;
            --pr4s-white: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9f9f9;
            color: var(--pr4s-black);
            margin: 0;
            padding: 0;
        }

        /* Branding Header */
        header {
            background: var(--pr4s-white);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--pr4s-black);
        }

        .logo {
            max-width: 280px;
            height: auto;
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #444;
            max-width: 600px;
            margin: 0 auto;
        }

        /* The 12-City Grid */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .planner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        /* City Card Styling */
        .city-card {
            background: var(--pr4s-white);
            border: 4px solid var(--pr4s-black);
            padding: 40px 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease-in-out;
        }

        .city-card:hover {
            border-color: var(--pr4s-red);
            transform: translateY(-8px);
            box-shadow: 12px 12px 0px var(--pr4s-black);
        }

        .council-logo {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin-bottom: 25px;
            /* Placeholder styling */
            background: #eee;
            border-radius: 50%;
        }

        .city-name {
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
        }

        .btn-label {
            margin-top: 20px;
            font-weight: bold;
            color: var(--pr4s-red);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>

        <p class="subtitle">Select your destination to unlock exclusive Park & Ride shopping rewards before you arrive.</p>
    </header>
