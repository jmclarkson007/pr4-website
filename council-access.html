<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority Access | PR4Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .gate-card { border-top: 6px solid #cc0000; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center font-sans p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden gate-card">
        <div class="p-8 text-center bg-slate-50 border-b">
            <div class="text-3xl font-black italic tracking-tighter mb-2">
                <span class="logo-pr4">PR4</span><span>Shopping</span>
            </div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Local Authority Portal</p>
        </div>

        <div class="p-10 space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Select Jurisdiction</label>
                <select id="city-select" class="w-full p-4 border border-slate-200 rounded-xl bg-white focus:border-red-600 outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                    <option value="Bath">Bath</option>
                    <option value="Cambridge">Cambridge</option>
                    <option value="Canterbury">Canterbury</option>
                    <option value="Chester">Chester</option>
                    <option value="Exeter">Exeter</option>
                    <option value="Norwich">Norwich</option>
                    <option value="Oxford">Oxford</option>
                    <option value="Salisbury">Salisbury</option>
                    <option value="Stratford-upon-Avon">Stratford-upon-Avon</option>
                    <option value="Winchester">Winchester</option>
                    <option value="Worcester">Worcester</option>
                    <option value="York">York</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Authorisation Key</label>
                <input type="password" id="gate-key" placeholder="••••••••••••" 
                       class="w-full p-4 border border-slate-200 rounded-xl bg-white focus:border-red-600 outline-none tracking-widest font-mono shadow-sm">
            </div>

            <button onclick="verifyGate()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-xl uppercase tracking-widest hover:bg-red-600 transition-all shadow-lg active:scale-95">
                Secure Login
            </button>

            <p id="error-msg" class="text-red-600 text-[10px] font-bold uppercase text-center hidden italic">
                Invalid key for selected jurisdiction.
            </p>
        </div>

        <div class="p-6 bg-slate-50 text-center border-t">
            <p class="text-[9px] text-slate-400 leading-relaxed uppercase font-medium">
                Internal Use Only • Encrypted Session Required <br>
                &copy; 2026 Perimetr Business Services
            </p>
        </div>
    </div>

    <script>
        function verifyGate() {
            const city = document.getElementById('city-select').value;
            const key = document.getElementById('gate-key').value;
            const error = document.getElementById('error-msg');

            // Logic: Key must be ADMIN-[CityName] 
            // We pass the city and key via URL parameters to the dashboard
            if (key === `ADMIN-${city}`) {
                // Redirect to your dashboard page with the credentials in the URL
                window.location.href = `council.html?city=${encodeURIComponent(city)}&key=${encodeURIComponent(key)}`;
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        }
    </script>
</body>
</html>
