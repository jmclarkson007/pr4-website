<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority Gateway | PR4Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .council-border { border-top: 6px solid #cc0000; }
        .tab-active { border-bottom: 4px solid #cc0000; color: #cc0000; }
        #dashboard-view { display: none; }
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <header class="bg-white border-b py-8 shadow-sm">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="text-3xl font-black italic tracking-tighter">
                    <span class="logo-pr4">PR4</span><span>Shopping</span>
                </div>
                <div class="h-6 w-[1px] bg-slate-200"></div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Governance & Analytics</div>
            </div>
            <button onclick="logout()" class="text-[10px] font-bold text-slate-400 hover:text-red-600 uppercase tracking-widest transition-colors">Terminate Session</button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-16">
        
        <div id="dashboard-view" class="space-y-10 animate-in fade-in duration-700">
            
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-8 border-b pb-8 border-slate-200">
                <div>
                    <h1 id="active-city-title" class="text-7xl font-black text-slate-900 uppercase tracking-tighter leading-none">CITY</h1>
                    <div class="flex gap-8 mt-6">
                        <button id="tab-btn-data" onclick="switchTab('data')" class="pb-3 font-bold uppercase text-[11px] tracking-[0.2em] tab-active transition-all">Metric Analytics</button>
                        <button id="tab-btn-assets" onclick="switchTab('assets')" class="pb-3 font-bold uppercase text-[11px] tracking-[0.2em] text-slate-400 hover:text-red-600 transition-all">Terminal Signage</button>
                    </div>
                </div>
                
                <div id="fy-filter" class="flex flex-col items-center md:items-end">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Financial Reporting Year</label>
                    <select id="fy-select" onchange="loadData()" class="p-3 border border-slate-200 rounded-lg font-bold text-sm bg-white shadow-sm outline-none px-6">
                        <option value="2025">FY 2025/26</option>
                        <option value="2024">FY 2024/25</option>
                    </select>
                </div>
            </div>

            <div id="content-data" class="space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="bg-white p-10 rounded-2xl shadow-sm border border-slate-100 group hover:border-red-100 transition-all">
                        <div class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest group-hover:text-red-600">Registered Businesses</div>
                        <div id="stat-merchants" class="text-6xl font-black text-slate-900">0</div>
                    </div>
                    <div class="bg-white p-10 rounded-2xl shadow-sm border border-slate-100 group hover:border-red-100 transition-all">
                        <div class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest group-hover:text-red-600">Total Redemptions</div>
                        <div id="stat-redemptions" class="text-6xl font-black text-red-600">0</div>
                    </div>
                    <div class="bg-white p-10 rounded-2xl shadow-sm border border-slate-100 group hover:border-red-100 transition-all">
                        <div class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest group-hover:text-red-600">Success Rate</div>
                        <div id="stat-success" class="text-6xl font-black text-slate-900">0%</div>
                    </div>
                </div>
